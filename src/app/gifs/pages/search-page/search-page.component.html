<h2 class="text-2xl font-bold mt-5">Buscar Gifs</h2>
<h3 class="text-sm text-grey-50">Buscar gifs por nombre, descripción o tags</h3>

<section class="flex flex-col gap-4">
    <input type="text" placeholder="Buscar gifs..." class="mt-3 p-2 border border-gray-300 rounded"
        (keyup.enter)="onSearch(txtSearch.value)" #txtSearch />
</section>

<section class="grid mt-5">
    <app-gifs-list [gifs]="gifs()" />
</section>
